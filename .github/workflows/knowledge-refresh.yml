name: Auto-research — 72h knowledge pass

# Self-maintaining LLM Wiki (Karpathy pattern) in knowledge/.
# Every 72 hours a stdlib-only Python engine (knowledge/scripts/refresh.py, driven by
# knowledge/topic.json) runs four beats — LINT, VERIFY, adversarial CROSS-CHECK, and
# DISCOVER — using the FREE Google Gemini API with Google Search grounding, writes a
# human-readable knowledge/DIGEST.md, and opens a pull request with whatever changed so
# the AI-assisted edits are reviewed before merge. See knowledge/CLAUDE.md §4.
#
# ONE-TIME SETUP (repo admin) — no paid key, no GitHub App needed:
#   1. Get a free Gemini key:  https://aistudio.google.com/apikey
#   2. Add repo secret  GEMINI_API_KEY  (Settings → Secrets and variables → Actions)
#   3. Settings → Actions → General → Workflow permissions:
#      enable "Allow GitHub Actions to create and approve pull requests".
#
# NOTE: scheduled workflows only fire from the repository's DEFAULT branch (active on main).
# Use "Run workflow" to trigger a pass on demand.

on:
  schedule:
    # Every 72 hours: 06:23 UTC on every 3rd day-of-month (3,6,9,…,30), off the :00 mark
    # on purpose. Cron can't express a true rolling 72h interval across month boundaries,
    # so the gap resets at the 1st — the conventional "every 3 days".
    - cron: "23 6 */3 * *"
  workflow_dispatch:
    inputs:
      scope:
        description: "Lint scope label (recorded in the log line)"
        required: false
        default: "all"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: knowledge-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate engine (dry run — lint + digest, no API)
        env:
          DRY_RUN: "1"
        run: python knowledge/scripts/refresh.py

      - name: Run knowledge pass (verify + cross-check + discover)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCOPE: ${{ github.event.inputs.scope || 'all' }}
        run: python knowledge/scripts/refresh.py

      - name: Rebuild dashboard
        env:
          REPO_SLUG: ${{ github.repository }}
        run: python knowledge/scripts/build_dashboard.py

      - name: Open pull request with changes
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/knowledge-refresh
          base: main
          commit-message: "knowledge: 72h auto-research pass (verify + discover)"
          title: "Auto-research — knowledge pass"
          body: |
            Automated maintenance pass over the LLM Wiki (`knowledge/`).

            A stdlib Python engine (`knowledge/scripts/refresh.py`, driven by
            `knowledge/topic.json`) ran four beats with the **free Gemini API + Google
            Search grounding**:
            - **Lint** — flagged stale claims, orphan pages, and gaps
            - **Verify + cross-check** — confirmed sources, then adversarially tried to
              refute them (`verified` only if confirmed *and* not refuted, else `contested`)
            - **Discover** — searched for new sanctioned-source publications and filed
              candidates to `knowledge/sources/inbox.md`

            **See `knowledge/DIGEST.md`** for the what's-new / changed / re-check summary,
            and `knowledge/log.md` for the `LINT` line.

            Review the diff before merging — these are AI-assisted research edits.
          labels: knowledge-base, automated
          delete-branch: true
